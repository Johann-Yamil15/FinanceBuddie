<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Finance Buddy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/static/css/auth/auth.css">
</head>

<body class="auth-bg">
    <div class="auth-wrapper">
        <div class="auth-card" id="authCard">

            <div class="brand-container">
                <div class="brand-circle">
                    <img src="/static/images/buddie_icon.png" alt="Buddy Icon" class="brand-logo">
                </div>
            </div>

            <div class="auth-form-container" id="loginSection">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-dark">¡Bienvenido!</h2>
                    <p class="text-muted">Inicia sesión para continuar</p>
                </div>

                <form action="/login" method="POST">
                    <div class="mb-3">
                        <label class="form-label-custom">Correo Electrónico</label>
                        <div class="input-group-custom">
                            <i data-lucide="mail"></i>
                            <input type="email" name="email" placeholder="ejemplo@correo.com" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label-custom">Contraseña</label>
                        <div class="input-group-custom">
                            <i data-lucide="lock"></i>
                            <input type="password" name="password" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="text-end mb-4">
                        <a href="#" class="forgot-link small">¿Olvidaste tu contraseña?</a>
                    </div>

                    <button type="submit" class="btn-auth-primary">INICIAR SESIÓN</button>
                </form>

                <div class="auth-footer">
                    <span>¿No tienes cuenta?</span>
                    <button class="btn-switch" onclick="toggleAuth()">CREAR CUENTA</button>
                </div>
            </div>

            <div class="auth-form-container d-none" id="registerSection">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-dark">Únete a nosotros</h2>
                    <p class="text-muted">Crea tu perfil financiero</p>
                </div>

                <form action="/register" method="POST">
                    {% csrf_token %} <div class="mb-3">
                        <label class="form-label-custom">Nombre(s)</label>
                        <div class="input-group-custom">
                            <i data-lucide="user"></i>
                            <input type="text" name="nombre" placeholder="Tu nombre" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label-custom">Apellido Paterno</label>
                            <div class="input-group-custom">
                                <input type="text" name="ap" placeholder="Paterno" required>
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label-custom">Apellido Materno</label>
                            <div class="input-group-custom">
                                <input type="text" name="am" placeholder="Materno" required>
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label-custom">Fecha de Nacimiento</label>
                        <div class="input-group-custom">
                            <i data-lucide="calendar"></i>
                            <input type="date" name="fecha_nac" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label-custom">Correo Electrónico</label>
                        <div class="input-group-custom">
                            <i data-lucide="mail"></i>
                            <input type="email" name="email" placeholder="johann@correo.com" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label-custom">Contraseña</label>
                        <div class="input-group-custom">
                            <i data-lucide="lock"></i>
                            <input type="password" name="password" placeholder="••••••••" required>
                        </div>
                    </div>

                    <button type="submit" class="btn-auth-primary">REGISTRARSE</button>
                </form>

                <div class="auth-footer">
                    <span>¿Ya eres miembro?</span>
                    <button class="btn-switch" onclick="toggleAuth()">INICIAR SESIÓN</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/auth/auth.js"></script>
    <script>lucide.createIcons();</script>
</body>

</html>
